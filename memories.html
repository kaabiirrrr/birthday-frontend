<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories 📸</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Short+Stack&family=Caveat:wght@400;700&family=Patrick+Hand&display=swap">
  <link rel="stylesheet" href="./style.css">
  <script>
    if (sessionStorage.getItem('birthday_unlocked') !== 'true') {
      window.location.href = 'index.html';
    }
  </script>
  <script src="tracker.js"></script>
  <style>
    p {
      font-family: inherit;
      font-size: inherit;
      opacity: 1;
      user-select: auto;
      color: inherit;
    }

    body {
      min-height: 100vh;
      height: auto !important;
      margin: 0;
      background-image: url("https://www.psdgraphics.com/wp-content/uploads/2022/01/white-math-paper-texture.jpg");
      background-size: 1000px;
      background-position: center;
      padding: 60px 20px 50px;
      box-sizing: border-box;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start !important;
    }

    .top-music {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-heading {
      text-align: center;
      margin-bottom: 44px;
    }

    .page-heading h1 {
      font-family: 'Short Stack', cursive;
      font-size: clamp(28px, 5vw, 50px);
      color: #c2185b;
      margin: 0 0 8px 0;
    }

    .page-heading .subtitle-text {
      font-family: 'Caveat', cursive;
      font-size: clamp(24px, 3vw, 34px);
      color: #777;
      font-weight: bold;
      margin: 0;
    }

    /* Polaroid grid - larger on full page */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      padding: 15px;
      width: 100%;
      max-width: 1200px;
      margin-bottom: 52px;
    }

    .polaroid-img-wrapper {
      position: relative !important;
      aspect-ratio: 1 / 1 !important;
      overflow: hidden !important;
    }

    .polaroid-img-wrapper img {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-height: none !important;
      object-fit: cover !important;
      object-position: center !important;
      display: block !important;
    }

    .polaroid-card {
      max-width: 280px !important;
      padding: 12px 12px 32px 12px !important;
      justify-self: center;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
    }

    /* Alternating shaky columns for memories page only */
    .photos-grid .polaroid-card:nth-child(3n+1) {
      transform: rotate(-2deg) translateY(-12px);
    }

    .photos-grid .polaroid-card:nth-child(3n+2) {
      transform: rotate(2.5deg) translateY(12px);
    }

    .photos-grid .polaroid-card:nth-child(3n+3) {
      transform: rotate(-1deg) translateY(-6px);
    }

    /* Straighten card on hover */
    .photos-grid .polaroid-card:hover {
      transform: scale(1.08) rotate(0deg) translateY(-8px) !important;
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.22) !important;
      z-index: 10;
    }

    .polaroid-card:hover img {
      transform: scale(1.12) !important;
    }

    .polaroid-caption {
      font-size: 22px !important;
      margin-top: 12px !important;
    }

    /* Premium Lightbox Polaroid card */
    .lightbox-card {
      background: white;
      padding: 16px 16px 36px 16px;
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      max-width: 90%;
      width: 360px;
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lightbox.active .lightbox-card {
      transform: scale(1);
    }

    .lightbox-card .lightbox-img-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1 !important;
      overflow: hidden;
      border: 1px solid #ddd;
      background-color: #f7f9fa;
      position: relative;
    }

    .lightbox-card img {
      width: 100%;
      height: 100%;
      max-height: none !important;
      object-fit: cover !important;
      object-position: center !important;
      position: absolute;
      inset: 0;
    }

    .lightbox-card .lightbox-caption {
      margin-top: 16px;
      color: #2c3e50 !important;
      font-family: 'Patrick Hand', cursive;
      font-size: 24px !important;
      text-align: center;
      text-shadow: none !important;
    }

    .btn-continue {
      font-family: 'Short Stack', cursive;
      font-size: 18px;
      padding: 16px 48px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6b81, #c2185b);
      color: white;
      box-shadow: 0 6px 20px rgba(194, 24, 91, 0.35);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-continue:hover {
      transform: scale(1.06) translateY(-3px);
      box-shadow: 0 12px 28px rgba(194, 24, 91, 0.45);
    }

    @media (max-width: 600px) {
      .photos-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .polaroid-card {
        max-width: 280px !important;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 40px 10px 30px;
      }

      .page-heading {
        margin-bottom: 24px;
      }

      .page-heading h1 {
        font-size: 24px;
      }

      .page-heading .subtitle-text {
        font-size: 18px;
      }

      .photos-grid {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 5px;
      }

      .polaroid-card {
        max-width: 280px !important;
        padding: 12px 12px 32px 12px !important;
      }

      .polaroid-caption {
        font-size: 22px !important;
        margin-top: 12px !important;
      }

      .btn-continue {
        font-size: 16px;
        padding: 12px 36px;
      }
    }
  </style>
</head>

<body>
  <!-- Music Controls -->
  <div class="top-music">
    <button id="music-toggle" class="music-btn" aria-label="Toggle music">
      <span class="music-icon">🎵</span>
      <span class="music-text">Play Sound</span>
    </button>
    <div class="music-visualizer" id="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div class="page-heading">
    <h1>Cutee Person Photo Gallery 📸</h1>
    <p class="subtitle-text">Click kr photo vr tuzhach ye ❤️</p>
  </div>

  <div class="photos-grid">
    <div class="polaroid-card" data-caption="Favorite Friend 🤝">
      <div class="polaroid-img-wrapper">
        <img src="images/pr01.jpeg" alt="Memory 1" />
      </div>
      <div class="polaroid-caption">Favorite Friend 💕</div>
    </div>

    <div class="polaroid-card" data-caption="So Beautiful ✨">
      <div class="polaroid-img-wrapper">
        <img src="images/pr02.jpeg" alt="Memory 2" />
      </div>
      <div class="polaroid-caption">So Beautiful ✨</div>
    </div>

    <div class="polaroid-card" data-caption="Simply Gorgeous 🌸">
      <div class="polaroid-img-wrapper">
        <img src="images/pr03.jpeg" alt="Memory 3" />
      </div>
      <div class="polaroid-caption">Simply Gorgeous 🌸</div>
    </div>

    <div class="polaroid-card" data-caption="Cutest Smile ❤️">
      <div class="polaroid-img-wrapper">
        <img src="images/pr04.jpeg" alt="Memory 4" />
      </div>
      <div class="polaroid-caption">Cutest Smile ❤️</div>
    </div>

    <div class="polaroid-card" data-caption="Brightest Vibe ☀️">
      <div class="polaroid-img-wrapper">
        <img src="images/pr05.jpeg" alt="Memory 5" />
      </div>
      <div class="polaroid-caption">Brightest Vibe ☀️</div>
    </div>

    <div class="polaroid-card" data-caption="Sorry, iss din kee liye 😞">
      <div class="polaroid-img-wrapper">
        <img src="images/pr06.jpeg" alt="Memory 6" />
      </div>
      <div class="polaroid-caption">Sorry, iss din kee liye 😞</div>
    </div>

    <div class="polaroid-card" data-caption="Sparkling Eyes ✨">
      <div class="polaroid-img-wrapper">
        <img src="images/pr07.jpeg" alt="Memory 7" />
      </div>
      <div class="polaroid-caption">Sparkling Eyes ✨</div>
    </div>

    <div class="polaroid-card" data-caption="Cute ultra pro 🥰">
      <div class="polaroid-img-wrapper">
        <img src="images/pr08.jpeg" alt="Memory 8" />
      </div>
      <div class="polaroid-caption">Cute ultra pro 🥰</div>
    </div>

    <div class="polaroid-card" data-caption="Together Forever ♾️❤️">
      <div class="polaroid-img-wrapper">
        <img src="images/pr09.jpeg" alt="Memory 9" />
      </div>
      <div class="polaroid-caption">Together Forever ♾️</div>
    </div>
  </div>

  <a href="letter.html" class="btn-continue">Letter For U<br /><span style="font-size: 12px;">(Love Letter Nahi
      hh😂)</span> 💌</a>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <span class="lightbox-close" id="close-lightbox">&times;</span>
    <div class="lightbox-card">
      <div class="lightbox-img-wrapper">
        <img id="lightbox-img" src="" alt="Enlarged photo">
      </div>
      <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>
  </div>

  <script>
    /* Polaroid Lightbox */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');

    document.querySelectorAll('.polaroid-card').forEach(card => {
      card.addEventListener('click', () => {
        lightboxImg.src = card.querySelector('img').src;
        lightboxCaption.textContent = card.dataset.caption;
        lightbox.classList.add('active');
      });
    });

    document.getElementById('close-lightbox').addEventListener('click', () => lightbox.classList.remove('active'));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('active'); });

    /* Music Player */
    class MusicBox {
      constructor() {
        this.audio = new Audio('images/ishq_bulaava_bollywood.mp3');
        this.audio.loop = true;
        this.isPlaying = false;

        // Restore time position if exists
        const savedTime = sessionStorage.getItem('music_current_time');
        if (savedTime) {
          this.audio.currentTime = parseFloat(savedTime);
        }

        // Continuously update saved time
        this.audio.addEventListener('timeupdate', () => {
          sessionStorage.setItem('music_current_time', this.audio.currentTime);
        });
      }
      start() {
        this.isPlaying = true;
        sessionStorage.setItem('music_is_playing', 'true');
        this.audio.play().catch(err => console.log("Audio play blocked: " + err));
      }
      stop() {
        this.isPlaying = false;
        sessionStorage.setItem('music_is_playing', 'false');
        this.audio.pause();
      }
    }

    const musicBox = new MusicBox();
    const musicToggle = document.getElementById('music-toggle');
    const visualizer = document.getElementById('visualizer');
    const musicIcon = musicToggle.querySelector('.music-icon');
    const musicText = musicToggle.querySelector('.music-text');

    function updateMusicUI(playing) {
      if (playing) {
        musicIcon.textContent = '⏸️'; musicText.textContent = 'Pause Sound';
        musicToggle.classList.add('playing'); visualizer.classList.add('playing');
      } else {
        musicIcon.textContent = '🎵'; musicText.textContent = 'Play Sound';
        musicToggle.classList.remove('playing'); visualizer.classList.remove('playing');
      }
    }

    musicToggle.addEventListener('click', () => {
      if (musicBox.isPlaying) {
        musicBox.stop();
        updateMusicUI(false);
      } else {
        musicBox.start();
        updateMusicUI(true);
      }
    });

    function startAutoplay() {
      if (sessionStorage.getItem('music_is_playing') !== 'false') {
        musicBox.start();
        updateMusicUI(true);
      }
      window.removeEventListener('click', startAutoplay);
      window.removeEventListener('touchstart', startAutoplay);
    }

    window.addEventListener('load', () => {
      // Track page visit
      trackVisit('memories');

      if (sessionStorage.getItem('music_is_playing') === 'false') {
        updateMusicUI(false);
        return;
      }
      setTimeout(() => {
        musicBox.audio.play().then(() => {
          musicBox.isPlaying = true;
          sessionStorage.setItem('music_is_playing', 'true');
          updateMusicUI(true);
        }).catch(err => {
          console.log("Autoplay blocked, waiting for interaction.");
          window.addEventListener('click', startAutoplay);
          window.addEventListener('touchstart', startAutoplay);
        });
      }, 100);
    });
  </script>
</body>

</html>
